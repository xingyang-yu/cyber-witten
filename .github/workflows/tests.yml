name: tests

on:
  push:
  pull_request:

jobs:
  validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The validator and the guardrail retry-loop are pure stdlib (no
      # torch/faiss/network), so their unit tests run with no install step.
      - name: Citation-validator unit tests
        run: python -m evals.test_validator
      - name: Guardrail retry-loop unit tests
        run: python -m scripts.test_guardrail
