name: tests

on:
  push:
  pull_request:

jobs:
  validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The citation-grounding validator is pure stdlib (no torch/faiss/network),
      # so its unit tests run with no install step and gate every push.
      - name: Citation-validator unit tests
        run: python -m evals.test_validator
